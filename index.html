<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tournées">
<meta name="theme-color" content="#6C4FA1">
<link rel="apple-touch-icon" href="icon.png">
<title>Tournées Orléans — Révision dispatch</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --violet:#6C4FA1; --violet-dark:#574083; --paper:#FAFAF7; --ink:#221E2B;
  --grey:#6E6879; --line:#E4E1DA; --red:#D5342B; --yellow:#F5D941;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
html{-webkit-text-size-adjust:100%}
body{font-family:'Inter',system-ui,sans-serif;background:#EFEDE7;color:var(--ink);-webkit-font-smoothing:antialiased;
  overscroll-behavior-y:none;touch-action:manipulation}
button,label{touch-action:manipulation;user-select:none;-webkit-user-select:none}
button:active,.scan-btn:active{transform:scale(.97);transition:transform .08s}
header{padding-top:calc(18px + env(safe-area-inset-top))}
nav{-webkit-overflow-scrolling:touch;scrollbar-width:none}
nav::-webkit-scrollbar{display:none}
.wrap{padding-bottom:calc(90px + env(safe-area-inset-bottom))}
.wrap{max-width:760px;margin:0 auto;padding:0 14px 90px}

/* Header */
header{background:var(--violet);color:#fff;padding:18px 14px 14px;position:relative}
header::after{content:"";display:block;position:absolute;left:0;right:0;bottom:-6px;height:6px;
  background:repeating-linear-gradient(90deg,var(--violet) 0 26px,transparent 26px 34px);opacity:.35}
.hd-in{max-width:760px;margin:0 auto}
h1{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:30px;letter-spacing:.04em;text-transform:uppercase;line-height:1}
.hd-sub{font-size:12.5px;opacity:.85;margin-top:4px;font-weight:500}

/* Nav */
nav{display:flex;gap:6px;max-width:760px;margin:16px auto 14px;padding:0 14px;overflow-x:auto}
nav button{flex:0 0 auto;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:600;letter-spacing:.05em;
  text-transform:uppercase;padding:9px 16px;border:1.5px solid var(--ink);background:var(--paper);color:var(--ink);
  border-radius:4px;cursor:pointer}
nav button.on{background:var(--ink);color:#fff}

/* Depot bar */
#depotNav{display:flex;gap:6px;max-width:760px;margin:14px auto 0;padding:0 14px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
#depotNav::-webkit-scrollbar{display:none}
#depotNav button{flex:0 0 auto;font-family:'Barlow Condensed',sans-serif;font-size:14.5px;font-weight:700;letter-spacing:.04em;
  text-transform:uppercase;padding:7px 14px;border:1.5px solid var(--violet);background:#fff;color:var(--violet-dark);
  border-radius:4px 4px 0 0;cursor:pointer;text-align:center}
#depotNav button small{display:block;font-family:'Inter',sans-serif;font-weight:500;font-size:9px;text-transform:none;
  letter-spacing:0;color:var(--grey);margin-top:1px}
#depotNav button.on{background:var(--violet);color:#fff}
#depotNav button.on small{color:rgba(255,255,255,.85)}

/* Pouch card = fiche tarifold */
.pouch{background:var(--paper);border:3px solid var(--red);border-radius:5px;box-shadow:0 3px 10px rgba(30,20,50,.10);
  position:relative;margin-bottom:16px;overflow:hidden}
.pouch::before,.pouch::after{content:"";position:absolute;top:-3px;width:14px;height:9px;background:#2B2B2B;border-radius:0 0 4px 4px}
.pouch::before{left:20%}.pouch::after{right:20%}

.band{background:var(--violet);color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:16px;
  letter-spacing:.06em;text-transform:uppercase;padding:5px 12px}
.tour-head{padding:16px 14px 10px;text-align:center;border-bottom:1px solid var(--line)}
.tour-head .num{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:34px;color:var(--violet);letter-spacing:.05em}
.tour-head .jours{font-size:11.5px;color:var(--grey);text-transform:uppercase;letter-spacing:.14em;margin-top:2px;font-weight:600}

.clients{list-style:none}
.clients li{padding:7px 14px 7px 26px;border-bottom:1px solid var(--line);font-size:14px;font-weight:500}
.clients li:last-child{border-bottom:none}

/* Tournée color chips */
.chip{display:inline-block;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13.5px;letter-spacing:.05em;
  color:#fff;padding:2px 9px;border-radius:3px;vertical-align:middle}

/* Tournée selector grid */
.tsel{display:grid;grid-template-columns:repeat(auto-fill,minmax(105px,1fr));gap:8px;margin-bottom:16px}
.tsel button{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:18px;letter-spacing:.04em;padding:12px 4px;
  border-radius:5px;border:3px solid;background:var(--paper);cursor:pointer;color:var(--ink)}
.tsel button small{display:block;font-family:'Inter',sans-serif;font-weight:500;font-size:9.5px;color:var(--grey);
  letter-spacing:.06em;text-transform:uppercase;margin-top:2px}
.tsel button.on{color:#fff}
.tsel button.on small{color:rgba(255,255,255,.85)}

/* Flashcard */
.fc-zone{perspective:1200px}
.fcard{position:relative;min-height:300px;cursor:pointer;transform-style:preserve-3d;transition:transform .45s}
.fcard.flip{transform:rotateY(180deg)}
.face{position:absolute;inset:0;backface-visibility:hidden;background:var(--paper);border:3px solid var(--red);
  border-radius:6px;box-shadow:0 4px 14px rgba(30,20,50,.12);display:flex;flex-direction:column}
.face.back{transform:rotateY(180deg);overflow-y:auto}
.face .center{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:22px;text-align:center;gap:10px}
.fc-commune{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:34px;letter-spacing:.03em;text-transform:uppercase;line-height:1.05}
.fc-hint{font-size:11.5px;color:var(--grey);text-transform:uppercase;letter-spacing:.12em;font-weight:600}
.fc-count{font-size:13px;color:var(--grey)}
.fc-controls{display:flex;gap:8px;margin-top:12px}
.fc-controls button{flex:1;padding:13px;border-radius:5px;border:1.5px solid var(--ink);font-weight:700;font-size:14px;cursor:pointer;font-family:'Inter',sans-serif}
.b-ko{background:#fff;color:var(--red);border-color:var(--red)}
.b-ok{background:var(--ink);color:#fff}
.fc-meta{display:flex;justify-content:space-between;align-items:center;font-size:12.5px;color:var(--grey);margin:10px 2px;font-weight:600}
.linkbtn{background:none;border:none;color:var(--violet);font-weight:700;font-size:12.5px;cursor:pointer;text-decoration:underline}

/* Quiz */
.q-card{background:var(--paper);border:3px solid var(--ink);border-radius:6px;padding:20px 16px;box-shadow:0 4px 14px rgba(30,20,50,.10)}
.q-num{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--grey);font-weight:700;margin-bottom:8px}
.q-text{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:24px;line-height:1.15;margin-bottom:16px}
.q-text b{color:var(--violet)}
.opts{display:flex;flex-direction:column;gap:8px}
.opts button{text-align:left;padding:13px 14px;border-radius:5px;border:1.5px solid var(--line);background:#fff;
  font-size:14.5px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif}
.opts button.good{background:#E4F4E7;border-color:#2F8F5B;color:#1D5C39}
.opts button.bad{background:#FBE7E5;border-color:var(--red);color:#8F1F18}
.q-next{margin-top:14px;width:100%;padding:13px;border-radius:5px;border:none;background:var(--violet);color:#fff;font-weight:700;font-size:15px;cursor:pointer}
.score-line{font-size:13px;font-weight:700;color:var(--grey);margin-bottom:10px}
.result{background:var(--paper);border:3px solid var(--violet);border-radius:6px;padding:28px 18px;text-align:center}
.result .big{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:52px;color:var(--violet)}
.result p{color:var(--grey);font-size:14px;margin:6px 0 16px;font-weight:500}

/* Search */
.search input{width:100%;padding:14px;border-radius:5px;border:2px solid var(--ink);font-size:16px;font-family:'Inter',sans-serif;background:var(--paper)}
.hit{background:var(--paper);border:1.5px solid var(--line);border-left:5px solid var(--violet);border-radius:4px;
  padding:10px 12px;margin-top:8px;display:flex;justify-content:space-between;align-items:center;gap:10px}
.hit .cl{font-weight:700;font-size:14px}
.hit .loc{font-size:12px;color:var(--grey);font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.empty{color:var(--grey);font-size:14px;text-align:center;padding:24px 10px;font-weight:500}

/* Boussole des secteurs */
.compass{position:relative;width:min(340px,92vw);height:min(340px,92vw);margin:6px auto 18px}
.ring{position:absolute;inset:8%;border:2px dashed #B8B2C4;border-radius:50%}
.cnode{position:absolute;transform:translate(-50%,-50%);font-family:'Barlow Condensed',sans-serif;font-weight:700;
  font-size:15px;letter-spacing:.04em;color:#fff;padding:6px 10px;border-radius:4px;cursor:pointer;border:none;
  box-shadow:0 2px 6px rgba(30,20,50,.25);text-align:center;line-height:1.05}
.cnode small{display:block;font-family:'Inter',sans-serif;font-weight:600;font-size:8.5px;letter-spacing:.08em;opacity:.9}
.axe{background:var(--paper);border:1.5px solid var(--line);border-radius:5px;padding:11px 12px;margin-bottom:8px;font-size:13.5px;line-height:1.45}
.axe .dir{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;letter-spacing:.06em;text-transform:uppercase}
.reflex{background:var(--paper);border:1.5px solid var(--line);border-left:5px solid var(--yellow);border-radius:5px;
  padding:12px;margin-bottom:8px;font-size:13.5px;line-height:1.5}
.reflex b{color:var(--violet-dark)}
/* Scan */
.scan-btn{display:block;width:100%;padding:20px;border-radius:6px;border:3px dashed var(--violet);background:var(--paper);
  color:var(--violet-dark);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:22px;letter-spacing:.05em;
  text-transform:uppercase;cursor:pointer;text-align:center}
.scan-btn small{display:block;font-family:'Inter',sans-serif;font-weight:500;font-size:12px;text-transform:none;letter-spacing:0;color:var(--grey);margin-top:4px}
.preview{width:100%;max-height:220px;object-fit:contain;border-radius:5px;border:1.5px solid var(--line);margin-top:12px;background:#fff}
.loading{text-align:center;padding:26px 10px;color:var(--grey);font-weight:600;font-size:14px}
.spin{display:inline-block;width:26px;height:26px;border:3px solid var(--line);border-top-color:var(--violet);border-radius:50%;
  animation:sp .8s linear infinite;margin-bottom:8px}
@keyframes sp{to{transform:rotate(360deg)}}
.verdict{margin-top:14px;background:var(--paper);border-radius:6px;overflow:hidden;border:3px solid var(--ink);box-shadow:0 4px 14px rgba(30,20,50,.12)}
.verdict .v-tour{color:#fff;text-align:center;padding:18px 10px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:44px;letter-spacing:.05em;line-height:1}
.verdict .v-tour small{display:block;font-size:15px;font-weight:600;letter-spacing:.12em;opacity:.9;margin-top:2px}
.verdict .v-body{padding:14px}
.verdict .v-row{font-size:14px;padding:5px 0;border-bottom:1px solid var(--line)}
.verdict .v-row:last-child{border:none}
.verdict .v-row b{display:inline-block;min-width:86px;color:var(--grey);font-size:11px;text-transform:uppercase;letter-spacing:.08em}
.conf{display:inline-block;padding:2px 8px;border-radius:3px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.conf.haute{background:#E4F4E7;color:#1D5C39}.conf.moyenne{background:#FCF6D8;color:#6A5A12}.conf.basse{background:#FBE7E5;color:#8F1F18}
/* Écran PIN */
#lock{position:fixed;inset:0;background:var(--violet);z-index:99;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:20px}
#lock h2{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:30px;color:#fff;letter-spacing:.05em;text-transform:uppercase}
#lock p{color:rgba(255,255,255,.75);font-size:13px;font-weight:500}
.dots{display:flex;gap:14px;margin:6px 0}
.dot{width:16px;height:16px;border-radius:50%;border:2px solid #fff;background:transparent}
.dot.full{background:#fff}
.pad{display:grid;grid-template-columns:repeat(3,72px);gap:12px}
.pad button{height:72px;border-radius:50%;border:2px solid rgba(255,255,255,.5);background:rgba(255,255,255,.08);
  color:#fff;font-size:26px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif}
.pad button:active{background:rgba(255,255,255,.3)}
#lock.shake .dots{animation:shk .35s}
@keyframes shk{20%{transform:translateX(-10px)}40%{transform:translateX(10px)}60%{transform:translateX(-7px)}80%{transform:translateX(7px)}}
.hintbar{background:#FCF6D8;border:1.5px solid #E4CF6A;border-radius:5px;padding:10px 12px;font-size:12.5px;color:#6A5A12;margin-bottom:14px;font-weight:500}
.wkbar{background:#2B2438;color:#fff;border-radius:6px;padding:12px 14px;font-size:13px;line-height:1.5;margin-bottom:14px;border-left:5px solid var(--yellow)}
.wkbar b{color:var(--yellow)}
.tstat{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#fff;padding:2px 7px;border-radius:3px;margin-left:8px;vertical-align:middle}
h2.sec{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:20px;letter-spacing:.05em;text-transform:uppercase;margin:4px 0 10px}
@media (prefers-reduced-motion: reduce){.fcard{transition:none}}
</style>
</head>

/* ============ VERROU PIN ============ */
const PIN_HASH="aa82088246685c17ebf16d48877686b831ed384ffdc42e76494283c271704d7a";
let pinBuf="";
async function sha(s){const b=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(s));
  return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('');}
function unlockOK(){document.getElementById('lock').style.display='none';try{localStorage.setItem('unlocked','1');}catch(e){}}
try{if(localStorage.getItem('unlocked')==='1')document.addEventListener('DOMContentLoaded',unlockOK);}catch(e){}
window.pin=async n=>{
  if(n===-1)pinBuf=pinBuf.slice(0,-1);
  else if(pinBuf.length<4)pinBuf+=String(n);
  document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('full',i<pinBuf.length));
  if(pinBuf.length===4){
    if(await sha(pinBuf)===PIN_HASH){unlockOK();}
    else{
      const L=document.getElementById('lock');L.classList.add('shake');
      if(navigator.vibrate)navigator.vibrate(120);
      setTimeout(()=>{L.classList.remove('shake');pinBuf="";
        document.querySelectorAll('.dot').forEach(d=>d.classList.remove('full'));},380);
    }
  }
};

/* ============ MODE WEEK-END (détection auto vendredi soir → samedi) ============ */
function inWeekendWindow(){
  const d=new Date(),day=d.getDay(),hour=d.getHours();
  return (day===5&&hour>=18)||day===6;
}
function tourWeekendStatus(t){
  if(t.jours.includes('M + VM'))return 'mixte';
  if(t.jours.includes('Vendredi'))return 'actif';
  return 'termine';
}
function weekendBannerHTML(){
  if(!inWeekendWindow())return '';
  const sat=new Date().getDay()===6;
  const msg=sat
    ?"Semaine clôturée : toutes les tournées (M et VM) sont terminées. Reprise et mise à jour des tournées lundi matin."
    :"Les tournées <b>M</b> (4501M→4505M, Pithiviers) sont terminées depuis jeudi soir. Seule <b>4507VM</b> (centre-ville) roule encore ce soir.";
  return `<div class="wkbar">🔄 <b>${sat?'Mode week-end':'Mode vendredi soir'}</b> — ${msg}</div>`;
}
function tourStatusBadge(t){
  if(!inWeekendWindow())return '';
  const st=tourWeekendStatus(t);
  const map={actif:['EN COURS','#2F8F5B'],mixte:['PARTIELLE','#C29A00'],termine:['TERMINÉE JEUDI','#B03060']};
  const [label,color]=map[st];
  return `<span class="tstat" style="background:${color}">${label}</span>`;
}

/* ============ FICHES ============ */
function tselHTML(sel,cb,withAll){
  const wk=inWeekendWindow();
  let h='<div class="tsel">';
  if(withAll)h+=`<button style="border-color:#221E2B;${sel==='ALL'?'background:#221E2B':''}" class="${sel==='ALL'?'on':''}" onclick="${cb}('ALL')">TOUTES<small>7 tournées</small></button>`;
  h+=curT().map((t,i)=>{const on=(sel===i||sel===t.id);
    const st=wk?tourWeekendStatus(t):null;
    const dim=st==='termine'?'opacity:.55;':'';
    const wkCol={actif:'#2F8F5B',mixte:'#C29A00',termine:'#B03060'};
    const statusSmall=wk?`<small style="color:${on?'rgba(255,255,255,.9)':wkCol[st]}">${st==='actif'?'● active':st==='mixte'?'● partielle':'● terminée'}</small>`:'';
    return `<button style="border-color:${t.c};${on?'background:'+t.c:''}${dim}" class="${on?'on':''}" onclick="${cb}(${withAll?`'${t.id}'`:i})">${t.id}<small>${t.communes.length} communes</small>${statusSmall}</button>`;}).join('');
  return h+'</div>';
}

}

/* ============ FLASHCARDS ============ */
function buildDeck(){
  const pool=[];
  curT().forEach(t=>{if(fcFilter!=='ALL'&&t.id!==fcFilter)return;
    t.communes.forEach(c=>pool.push({t,c}));});
  for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
  deck=pool;deckIdx=0;deckOk=0;deckRedo=[];flipped=false;
}
window.fcPick=id=>{fcFilter=id;buildDeck();render();};
window.fcFlip=()=>{flipped=!flipped;document.getElementById('fcard').classList.toggle('flip',flipped);};
window.fcMark=ok=>{if(ok)deckOk++;else deckRedo.push(deck[deckIdx]);deckIdx++;flipped=false;render();};
window.fcRedo=()=>{deck=deckRedo;deckRedo=[];deckIdx=0;deckOk=0;flipped=false;render();};
window.fcRestart=()=>{buildDeck();render();};

function renderFlash(){
  if(!deck.length&&deckIdx===0)buildDeck();
  let h=tselHTML(fcFilter,'fcPick',true);
  if(deckIdx>=deck.length){
    h+=`<div class="result"><div class="big">${deckOk} / ${deck.length}</div>
      <p>communes maîtrisées${deckRedo.length?` · ${deckRedo.length} à revoir`:' · série terminée 💪'}</p>
      ${deckRedo.length?`<button class="q-next" onclick="fcRedo()">Revoir les ${deckRedo.length} ratées</button><div style="height:8px"></div>`:''}
      <button class="q-next" style="background:#221E2B" onclick="fcRestart()">Nouvelle série</button></div>`;
    app.innerHTML=h;return;
  }
  const {t,c}=deck[deckIdx];
  h+=`<div class="fc-meta"><span>Carte ${deckIdx+1} / ${deck.length}</span><span>✔ ${deckOk} · à revoir ${deckRedo.length}</span></div>
  <div class="fc-zone"><div class="fcard ${flipped?'flip':''}" id="fcard" onclick="fcFlip()">
    <div class="face"><div class="center">
      ${chip(t)}
      <div class="fc-commune">${esc(c.n)}</div>
      <div class="fc-count">${c.cl.length} client${c.cl.length>1?'s':''} à retrouver</div>
      <div class="fc-hint">Touche la carte pour révéler</div>
    </div></div>
    <div class="face back">
      <div class="band">${esc(c.n)} — ${t.id}</div>
      <ul class="clients">${c.cl.map(x=>`<li>${esc(x)}</li>`).join('')}</ul>
    </div>
  </div></div>
  <div class="fc-controls">
    <button class="b-ko" onclick="fcMark(false)">✗ À revoir</button>
    <button class="b-ok" onclick="fcMark(true)">✓ Je savais</button>
  </div>`;
  app.innerHTML=h;
}

/* ============ QUIZ ============ */
function uniqueClients(){
  const map={};
  curT().forEach(t=>t.communes.forEach(c=>c.cl.forEach(x=>{(map[x]=map[x]||[]).push({t,c});})));
  return Object.entries(map).filter(([,v])=>v.length===1).map(([k,v])=>({cl:k,...v[0]}));
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function buildQuiz(){
  const uc=uniqueClients(), allCommunes=[];curT().forEach(t=>t.communes.forEach(c=>allCommunes.push({t,c})));
  quiz=[];qIdx=0;qScore=0;qAnswered=false;
  const pool1=shuffle([...uc]).slice(0,5);   // client -> commune
  pool1.forEach(u=>{
    const wrong=shuffle(allCommunes.filter(x=>x.c.n!==u.c.n)).slice(0,3).map(x=>x.c.n);
    quiz.push({q:`Dans quelle commune livre-t-on <b>${esc(u.cl)}</b> ?`,opts:shuffle([u.c.n,...wrong]),ans:u.c.n});
  });
  const pool2=shuffle([...allCommunes]).slice(0,5); // commune -> tournée
  pool2.forEach(x=>{
    const wrong=shuffle(curT().filter(t=>t.id!==x.t.id)).slice(0,3).map(t=>t.id);
    quiz.push({q:`Sur quelle tournée se trouve <b>${esc(x.c.n)}</b> ?`,opts:shuffle([x.t.id,...wrong]),ans:x.t.id});
  });
  shuffle(quiz);
}
window.qAnswer=(el,opt)=>{
  if(qAnswered)return;qAnswered=true;
  const good=quiz[qIdx].ans;
  if(opt===good)qScore++;
  document.querySelectorAll('.opts button').forEach(b=>{
    if(b.dataset.v===good)b.classList.add('good');
    else if(b===el)b.classList.add('bad');
  });
  document.getElementById('qnext').style.display='block';
};
window.qNext=()=>{qIdx++;qAnswered=false;render();};
window.qRestart=()=>{buildQuiz();render();};

function renderQuiz(){
  if(!quiz.length)buildQuiz();
  if(qIdx>=quiz.length){
    const pct=Math.round(qScore/quiz.length*100);
    app.innerHTML=`<div class="result"><div class="big">${qScore} / ${quiz.length}</div>
      <p>${pct>=80?'Solide, tu connais tes tournées 🔥':pct>=50?'Pas mal, encore un tour et c\'est acquis':'Repasse par les flashcards puis reviens'}</p>
      <button class="q-next" onclick="qRestart()">Rejouer (10 nouvelles questions)</button></div>`;
    return;
  }
  const q=quiz[qIdx];
  app.innerHTML=`<div class="score-line">Score : ${qScore} ✔</div>
  <div class="q-card">
    <div class="q-num">Question ${qIdx+1} / ${quiz.length}</div>
    <div class="q-text">${q.q}</div>
    <div class="opts">${q.opts.map(o=>`<button data-v="${esc(o)}" onclick="qAnswer(this,'${o.replace(/'/g,"\\'")}')">${esc(o)}</button>`).join('')}</div>
    <button class="q-next" id="qnext" style="display:none" onclick="qNext()">Question suivante →</button>
  </div>`;
}

window.doSearch=v=>{
  const box=document.getElementById('hits');
  const s=v.trim().toLowerCase();
  if(s.length<2){box.innerHTML='<div class="empty">Tape au moins 2 lettres (client ou commune).</div>';return;}
  const hits=[];
  curT().forEach(t=>t.communes.forEach(c=>{
    if(c.n.toLowerCase().includes(s))hits.push({t,c,cl:'— toute la commune —'});
    c.cl.forEach(x=>{if(x.toLowerCase().includes(s))hits.push({t,c,cl:x});});
  }));
  box.innerHTML=hits.length?hits.slice(0,40).map(h=>`<div class="hit">
    <div><div class="cl">${esc(h.cl)}</div><div class="loc">${esc(h.c.n)}</div></div>${chip(h.t)}
  </div>`).join(''):'<div class="empty">Aucun résultat — vérifie l\'orthographe.</div>';
};

}

  <div class="axe"><span class="dir" style="color:${T_ORLEANS[0].c}">4501M · Nord proche —</span> la première couronne du dépôt : Fleury-les-Aubrais, Saran, Ormes, St Jean de Braye. Zones commerciales et industrielles.</div>

  <div class="axe"><span class="dir" style="color:${T_ORLEANS[2].c}">4503M · Est, vallée de la Loire —</span> un couloir le long du fleuve : Chécy → St Denis de l'Hôtel → Châteauneuf → Ouzouer → Gien. Repère : les packs bancaires de centre-bourg.</div>
  <div class="axe"><span class="dir" style="color:${T_ORLEANS[3].c}">4504M · Nord-Ouest, la Beauce —</span> la longue distance vers le 28 : Artenay, Toury, Janville, Chartres, Châteaudun, Brou. Repère : presque tout est en (28) ou (41).</div>
  <div class="axe"><span class="dir" style="color:${T_ORLEANS[4].c}">4505M · Ouest —</span> sortie ouest (St Jean de la Ruelle, Ingré, La Chapelle St Mesmin) puis l'axe Beaugency : Baule, Tavers, Cléry… et remonte dans le 41 (Oucques, Moisy).</div>
  <div class="axe"><span class="dir" style="color:${T_ORLEANS[5].c}">Pithiviers · Nord-Est, le Gâtinais —</span> Neuville-aux-Bois, Pithiviers, Puiseaux, Sermaises. Beaucoup de techniciens SAV en campagne.</div>
  <div class="axe"><span class="dir" style="color:${T_ORLEANS[6].c}">4507VM · Le centre de l'horloge —</span> hyper-centre d'Orléans uniquement. Seule tournée VM (jusqu'au vendredi soir) : banques, cabinets médicaux, opticiens — la zone la plus dense en pros.</div>

  <h2 class="sec">Réflexes face à un colis</h2>
  <div class="reflex"><b>Marque de machines + nom de personne</b> (Fenwick, Still, Jung, Kone, AGCO, Claas…) = <b>technicien SAV</b> livré à domicile. C'est pour ça que des petits villages (Moisy, Nibelle, Coulmiers…) sont sur les feuilles — 1 village = 1 technicien, souvent unique. Ces noms sont les meilleurs indices pour retrouver la tournée.</div>
  <div class="reflex"><b>Pack bancaire</b> (BP, CE, CM, CIC, LCL, SG…) = <b>centre-bourg</b>. Gien, Châteauneuf, Chécy et Pithiviers ont quasiment le même pack. Si Martroi / Place d'Arc apparaît → 4507VM centre-ville.</div>
  <div class="reflex"><b>CW / Nemo / Poilane + enseigne</b> (Leclerc, Intermarché, Super U, Carrefour…) = <b>grande surface</b> en zone commerciale. CW Intermarché existe presque partout : ce client seul ne suffit jamais, regarde la commune.</div>
  <div class="reflex"><b>Suffixe des tournées</b> : M = du lundi soir au jeudi soir · VM = jusqu'au vendredi soir. Le numéro de département sur la feuille (28, 41, 45) te dit direct si on sort du Loiret.</div>`;
}

/* ============ SCAN ÉTIQUETTE (OCR local, open-source Tesseract.js — pas de clé API, pas de photo envoyée à un serveur) ============ */
function renderScan(){
  app.innerHTML=`<h2 class="sec">Scanner une étiquette</h2>
  <div class="hintbar">Cadre bien le <b>nom du destinataire</b> (+ la ville si visible). La lecture se fait directement dans le téléphone (OCR gratuit, aucune clé API), puis elle est matchée avec ta base. Spécial piège « Orléans » : c'est le client qui décide la tournée.</div>
  <label class="scan-btn">📷 Prendre l'étiquette en photo
    <small>ou choisir une photo existante</small>
    <input type="file" accept="image/*" capture="environment" style="display:none" onchange="scanImg(this)">
  </label>
  <div id="scan-out"></div>`;
}
window.scanImg=async inp=>{
  const f=inp.files&&inp.files[0];if(!f)return;
  const out=document.getElementById('scan-out');
  const url=URL.createObjectURL(f);
  out.innerHTML=`<img class="preview" src="${url}"><div class="loading"><span class="spin"></span><br><span id="scan-progress">Lecture de l'étiquette…</span></div>`;
  try{
    const text=await runOCR(f);
    const res=matchEntry(text);
    showVerdict(res,url);
  }catch(e){
    out.innerHTML=`<img class="preview" src="${url}"><div class="hintbar" style="margin-top:12px;background:#FBE7E5;border-color:#D5342B;color:#8F1F18">
      Échec de la lecture (${esc(String(e.message||e))}). Réessaie avec une photo plus nette et bien cadrée, ou tape le nom du client dans l'onglet Recherche.</div>`;
  }
  inp.value='';
};
const OCR_STATUS_FR={'loading tesseract core':'Chargement du moteur OCR','initializing tesseract':'Initialisation',
  'loading language traineddata':'Téléchargement du modèle FR','initializing api':'Préparation','recognizing text':'Lecture du texte'};
async function runOCR(file){
  if(typeof Tesseract==='undefined')throw new Error('moteur OCR indisponible (hors-ligne au premier lancement ?)');
  const {data}=await Tesseract.recognize(file,'fra',{
    logger:m=>{
      const el=document.getElementById('scan-progress');
      if(el&&m.status&&typeof m.progress==='number')
        el.textContent=`${OCR_STATUS_FR[m.status]||'Analyse'}… ${Math.round(m.progress*100)}%`;
    }
  });
  return data.text||'';
}
function normTxt(s){
  return (s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toUpperCase().replace(/[^A-Z0-9]+/g,' ').trim();
}
function stripParens(s){return (s||'').replace(/\([^)]*\)/g,' ');}
function levenshtein(a,b){
  const m=a.length,n=b.length,dp=Array.from({length:m+1},()=>new Array(n+1).fill(0));
  for(let i=0;i<=m;i++)dp[i][0]=i;
  for(let j=0;j<=n;j++)dp[0][j]=j;
  for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)
    dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j-1],dp[i-1][j],dp[i][j-1]);
  return dp[m][n];
}
function wordSim(a,b){if(!a.length||!b.length)return 0;return 1-levenshtein(a,b)/Math.max(a.length,b.length);}
function flatEntries(){
  const arr=[];
  curT().forEach(t=>t.communes.forEach(c=>{
    arr.push({label:c.n,type:'commune',t,c});
    c.cl.forEach(cl=>arr.push({label:cl,type:'client',t,c}));
  }));
  return arr;
}
let ENTRIES=[], COMMUNE_TOURS={};
function rebuildIndex(){
  ENTRIES=flatEntries();
  COMMUNE_TOURS={};
  curT().forEach(t=>t.communes.forEach(c=>{(COMMUNE_TOURS[c.n]=COMMUNE_TOURS[c.n]||new Set()).add(t.id);}));
}
function communeAmbiguous(name){return (COMMUNE_TOURS[name]&&COMMUNE_TOURS[name].size)>1;}
function scoreLabel(labelWords,ocrWords){
  let weightSum=0,matchSum=0;
  labelWords.forEach(w=>{
    if(w.length<2)return;
    let best=0;
    for(const ow of ocrWords){const s=wordSim(w,ow);if(s>best)best=s;}
    weightSum+=w.length;matchSum+=w.length*best;
  });
  return {score:weightSum?matchSum/weightSum:0,weight:weightSum};
}
function scoreEntries(list,ocrWords){
  // en cas de score identique, on privilégie l'étiquette la plus longue/spécifique (plus d'évidence qu'un simple sigle générique)
  // les suffixes entre parenthèses ("(28)", "(centre-ville)"...) sont des repères internes à la base,
  // pas du texte qui apparaît tel quel sur une étiquette réelle : on les ignore pour le score.
  return list.map(e=>{const {score,weight}=scoreLabel(normTxt(stripParens(e.label)).split(' '),ocrWords);return {e,score,weight};})
    .sort((a,b)=>(b.score-a.score)||(b.weight-a.weight));
}
function matchEntry(rawText){
  const lu=rawText.replace(/\s+/g,' ').trim().slice(0,140);
  const ocrWords=normTxt(rawText).split(' ').filter(w=>w.length>1);
  if(!ocrWords.length)
    return {lu,client:null,commune:null,tournee:null,confiance:'basse',alternatives:[],note:"Aucun texte détecté, reprends la photo bien cadrée sur l'étiquette."};
  const communes=scoreEntries(ENTRIES.filter(e=>e.type==='commune'),ocrWords);
  const clients=scoreEntries(ENTRIES.filter(e=>e.type==='client'),ocrWords);
  const bestCommune=communes[0], bestClient=clients[0];
  if((!bestCommune||bestCommune.score<0.45)&&(!bestClient||bestClient.score<0.45))
    return {lu,client:null,commune:null,tournee:null,confiance:'basse',alternatives:[],note:"Aucune correspondance fiable trouvée dans la base."};

  // Réflexe métier : une commune explicite et fiable (non ambiguë entre tournées) fait autorité,
  // le client sert juste à préciser. Si la commune est un piège (ex: Orléans, présent sur plusieurs
  // tournées) ou peu fiable, c'est le client qui tranche à la place.
  const communeReliable=bestCommune&&bestCommune.score>0.72&&!communeAmbiguous(bestCommune.e.c.n);
  let communeName,tournee,client,score,alt=[];
  if(communeReliable){
    communeName=bestCommune.e.c.n;tournee=bestCommune.e.t.id;score=bestCommune.score;
    // pour retrouver le client, on ignore les mots déjà "consommés" par le nom de la commune
    // (sinon un client du type "Dr Mos Gien" matcherait juste parce que "Gien" est déjà reconnu)
    const communeWords=new Set(normTxt(stripParens(communeName)).split(' '));
    const remaining=ocrWords.filter(w=>!communeWords.has(w));
    const localCandidates=ENTRIES.filter(e=>e.type==='client'&&e.c.n===communeName);
    const localScored=remaining.length?scoreEntries(localCandidates,remaining):[];
    client=localScored[0]&&localScored[0].score>0.5?localScored[0].e.label:null;
    alt=communes.slice(1).filter(s=>s.e.c.n!==communeName&&s.score>bestCommune.score-0.25).slice(0,3)
      .map(s=>`${s.e.t.id} · ${s.e.c.n}`);
  }else{
    const pick=bestClient&&bestClient.score>=0.45?bestClient:bestCommune;
    communeName=pick.e.c.n;tournee=pick.e.t.id;score=pick.score;
    client=pick.e.type==='client'?pick.e.label:null;
    alt=clients.concat(communes).filter(s=>s.e.c.n!==communeName&&s.score>=pick.score-0.2)
      .sort((a,b)=>b.score-a.score).slice(0,3).map(s=>`${s.e.t.id} · ${s.e.c.n}`);
  }
  const confiance=score>0.82?'haute':score>0.6?'moyenne':'basse';
  const note=communeName.startsWith('ORLÉANS')?"« Orléans » existe sur plusieurs tournées : vérifie le nom du client ci-dessus."
    :alt.length?"Plusieurs correspondances possibles, vérifie la ville sur l'étiquette.":'';
  return {lu,client,commune:communeName,tournee,confiance,alternatives:alt,note};
}
function showVerdict(v,url){
  const out=document.getElementById('scan-out');
  const t=curT().find(x=>x.id===v.tournee);
  if(!t){
    out.innerHTML=`<img class="preview" src="${url}">
    <div class="verdict"><div class="v-tour" style="background:#6E6879">INTROUVABLE<small>pas de correspondance</small></div>
    <div class="v-body">
      <div class="v-row"><b>Lu</b> ${esc(v.lu||'—')}</div>
      <div class="v-row"><b>Note</b> ${esc(v.note||'Vérifie manuellement dans Recherche.')}</div>
    </div></div>`;
    return;
  }
  out.innerHTML=`<img class="preview" src="${url}">
  <div class="verdict" style="border-color:${t.c}">
    <div class="v-tour" style="background:${t.c}">${t.id}<small>${esc(v.commune||'')}</small></div>
    <div class="v-body">
      <div class="v-row"><b>Client</b> ${esc(v.client||'—')}</div>
      <div class="v-row"><b>Lu</b> ${esc(v.lu||'—')}</div>
      <div class="v-row"><b>Confiance</b> <span class="conf ${v.confiance||'moyenne'}">${esc(v.confiance||'moyenne')}</span></div>
      ${v.alternatives&&v.alternatives.length?`<div class="v-row"><b>Sinon</b> ${v.alternatives.map(esc).join(' · ')}</div>`:''}
      ${v.note?`<div class="v-row"><b>Note</b> ${esc(v.note)}</div>`:''}
    </div>
  </div>`;
}

/* ============ RENDER ============ */
function render(){
  if(mode==='scan')renderScan();
  else if(mode==='fiches')renderFiches();
  else if(mode==='logic')renderLogic();
  else if(mode==='flash')renderFlash();
  else if(mode==='quiz')renderQuiz();
  else renderSearch();
  const b=weekendBannerHTML();
  if(b)app.insertAdjacentHTML('afterbegin',b);
}
rebuildIndex();
renderDepotNav();
renderNav();render();
</script>
